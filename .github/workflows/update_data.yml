name: Update Info Data

on:
  schedule:
    - cron: '*/5 * * * *'  # Run every 5 minutes
  workflow_dispatch:      # Allow manual trigger

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false  # Wait for in-progress run to finish before starting new one

jobs:
  update-info-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run unified data sync script
        run: node sync_all_data.js

      - name: Stamp PWA build version into sw.js and index.html
        run: node build_pwa.js

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add info_data.json drive_data.json map_data.json sw.js index.html
          if ! git diff --staged --quiet; then
            git commit -m "chore: auto-update data and stamp PWA version [skip ci]"
            git pull --rebase origin main
            git push
          else
            echo "No changes to commit"
          fi
